<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <div class="card-container">
      <div class="card">
        <div class="image">
          <img alt="" src="assets/images/illustration-article.svg" aria-hidden="true">
        </div>
        <div class="content">
          <span class="category">
            Learning
          </span>
          <div class="content-date">
            Published <time datetime="2023-12-21">21 Dec 2023</time>
          </div>
          <h1>
            HTML & CSS foundations
          </h1>
          <p>
            These languages are the backbone of every website, defining structure, content, and presentation.
          </p>
        </div>
        <div class="author">
          <div class="avatar">
            <img src="assets/images/image-avatar.webp" alt="author profile picture">
          </div>
          Greg Hooper
        </div>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
